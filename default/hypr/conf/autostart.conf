# ===== Session Environment (MUST BE FIRST) =====
# Propagate Wayland env vars to systemd so graphical-session.target activates
# Without this, systemd user services (walker, elephant, mako, etc.) never start
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ===== Polkit Agent =====
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ===== Clipboard History =====
exec-once = wl-paste --watch cliphist store

# ===== UWSM Check =====
exec-once = ~/.local/share/dotfiles/bin/check-uwsm

# NOTE: The following apps are launched via systemd user services
# (enabled by setup-system), NOT exec-once, to avoid double-launching:
#   - waybar.service    (package-provided)
#   - walker.service    (custom, in default/systemd/user/)
#   - elephant.service  (custom, in default/systemd/user/)
#   - hyprpaper.service (package-provided)
#   - mako.service      (package-provided)
#   - hypridle.service  (package-provided)
#   - swayosd.service   (custom, in default/systemd/user/)
#   - sunsetr.service   (custom or package-provided)

# ===== Initial Wallpaper (via IPC) =====
# hyprpaper.conf only has ipc=true; wallpaper is set dynamically after hyprpaper starts
# readlink -f resolves the symlink so hyprpaper's path matching works correctly
exec-once = sleep 2 && hyprctl hyprpaper reload ",$(readlink -f ~/.local/share/dotfiles/current/background)"
